# One workflow for everything that happens around main:
#  - pull_request: validate the content tree (and code) before merge, shown
#    in the PR's checks.
#  - push to main: deploy the workers if code changed, then reconcile content
#    to HEAD. `environment: content` makes GitHub record the deployment on the
#    merged PR, linking straight to this run — the run IS the observability.
name: publish

on:
  push:
    branches: [main]
  pull_request:

# Serialize main pushes (a reconcile converges to HEAD, so queued runs are
# fine); collapse superseded PR pushes.
concurrency:
  group: publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Pre-merge gate. Validates against the branch's own manifest, so it covers
  # code-bearing branches too; no secrets, so it runs on forks.
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
      - name: Install cargo-leptos, worker-build, and leptosfmt
        run: cargo binstall -y cargo-leptos worker-build leptosfmt
      - name: Lint and validate content
        run: just check
      - name: Run the test suite
        run: just test

  # Post-merge. Code steps run only when code changed; the reconcile always
  # runs and gates the job (and its deployment) on the real outcome.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: content
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Deploy must precede publish so content validates against the freshly
      # deployed manifest. Colocated per-post Rust (content/**/*.rs) is code.
      - name: Classify the push
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**/*.rs'
              - 'app/**'
              - 'crates/**'
              - 'workers/**'
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'justfile'
              - '**/wrangler.toml'

      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.code == 'true'
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.code == 'true'
      - uses: extractions/setup-just@v3
        if: steps.changes.outputs.code == 'true'
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
        if: steps.changes.outputs.code == 'true'
      - name: Install cargo-leptos, worker-build, and leptosfmt
        if: steps.changes.outputs.code == 'true'
        run: cargo binstall -y cargo-leptos worker-build leptosfmt

      - name: Lint and validate content
        if: steps.changes.outputs.code == 'true'
        run: just check
      - name: Run the test suite
        if: steps.changes.outputs.code == 'true'
        run: just test

      # Deploys rebuild via wrangler's [build] hook; this build only feeds the size gate.
      - name: Build both workers
        if: steps.changes.outputs.code == 'true'
        run: |
          just build
          just build-pipeline
      - name: Enforce the worker size budget
        if: steps.changes.outputs.code == 'true'
        run: just size

      - name: Deploy the site worker
        if: steps.changes.outputs.code == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: just deploy

      # A code deploy changes every page's hydration markup and asset URLs, so
      # the reconcile's per-post purge isn't enough — evict the whole site tag.
      # Defensive until Workers Cache's version-keyed cold starts are verified.
      # SITE_URL (repo variable) overrides the derived workers.dev URL.
      - name: Purge the site cache
        if: steps.changes.outputs.code == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PURGE_SHARED_SECRET: ${{ secrets.PURGE_SHARED_SECRET }}
          SITE_ORIGIN: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$SITE_ORIGIN" ]; then
            subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
              | jq -r '.result.subdomain')
            SITE_ORIGIN="https://chris-site.$subdomain.workers.dev"
          fi
          export SITE_ORIGIN
          just purge

      - name: Deploy the pipeline worker
        if: steps.changes.outputs.code == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: just deploy-pipeline

      # Always: reconcile content to HEAD through the pipeline, then purge the
      # scope it reports. The response is the outcome; a validation failure
      # (ok=false), a failed purge, or a transport error fails the job, so the
      # deployment on the merged PR goes red. cache.purge is scoped to the
      # entrypoint that runs it, so the eviction must come from the site worker
      # over public HTTP — the pipeline's own binding purge can't reach it.
      # PIPELINE_URL / SITE_URL (repo variables) override the derived workers.dev URLs.
      - name: Publish (reconcile to HEAD)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PUBLISH_SHARED_SECRET: ${{ secrets.PUBLISH_SHARED_SECRET }}
          PURGE_SHARED_SECRET: ${{ secrets.PURGE_SHARED_SECRET }}
          PIPELINE_URL: ${{ vars.PIPELINE_URL }}
          SITE_ORIGIN: ${{ vars.SITE_URL }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$PIPELINE_URL" ]; then
            subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
              | jq -r '.result.subdomain')
            PIPELINE_URL="https://chris-pipeline.$subdomain.workers.dev"
          fi
          response=$(curl -sS -w '\n%{http_code}' -X POST "$PIPELINE_URL/publish" \
            -H "Authorization: Bearer $PUBLISH_SHARED_SECRET" \
            -H "Content-Type: application/json" \
            --data "{\"repository\":\"$GITHUB_REPOSITORY\",\"branch\":\"$BRANCH\"}")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n1)
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "::error::publish failed (HTTP $code)"
            exit 1
          fi
          summary=$(echo "$body" | jq -r '.summary')
          echo "publish: $summary"

          # Evict exactly what the flip changed, regardless of the validation
          # outcome (a carry-forward still flips the snapshot). Empty scope =>
          # nothing changed => nothing to purge. Retry for Instant-Purge
          # propagation; a hard failure fails the job (break-glass: just purge).
          tags=$(echo "$body" | jq -c '.tags')
          if [ "$tags" != "[]" ]; then
            if [ -z "$SITE_ORIGIN" ]; then
              subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
                | jq -r '.result.subdomain')
              SITE_ORIGIN="https://chris-site.$subdomain.workers.dev"
            fi
            export SITE_ORIGIN
            for attempt in 1 2 3; do
              if just purge "$tags"; then
                echo "purge: evicted $tags"
                break
              fi
              if [ "$attempt" = 3 ]; then
                echo "::error::cache purge failed after 3 attempts ($tags)"
                exit 1
              fi
              echo "purge attempt $attempt failed; retrying in 5s"
              sleep 5
            done
          fi

          if [ "$(echo "$body" | jq -r '.ok')" != "true" ]; then
            echo "::error::$summary"
            exit 1
          fi
