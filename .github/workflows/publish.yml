# Fired by the pipeline worker on code pushes. Deploy precedes the /publish
# callback, which reconciles to HEAD — stale runs can't publish old content.
name: publish

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit that triggered the publish
        required: true
        type: string

# Superseded queued runs are fine: every /publish callback reconciles to HEAD.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

# Cloudflare credentials stay step-scoped — never ambient env for
# third-party actions or dependency build scripts.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v3

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - name: Install cargo-leptos, worker-build, and leptosfmt
        run: cargo binstall -y cargo-leptos worker-build leptosfmt

      - name: Lint and validate content
        run: just check

      - name: Run the test suite
        run: just test

      # Deploys rebuild via wrangler's [build] hook; this build only feeds the size gate.
      - name: Build both workers
        run: |
          just build
          just build-pipeline

      # Fails past the 10 MB gzipped Workers limit, warns at 5 MB
      - name: Enforce the worker size budget
        run: just size

      - name: Deploy the site worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: just deploy

      - name: Deploy the pipeline worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: just deploy-pipeline

      # No purge step: Workers Cache keys on the deployed version, so every
      # deploy starts from an empty cache by construction.

      # Reconcile after deploy so content lands against the fresh manifest;
      # PIPELINE_URL (repo variable) overrides the derived workers.dev URL.
      - name: Trigger the publish reconcile
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PUBLISH_SHARED_SECRET: ${{ secrets.PUBLISH_SHARED_SECRET }}
          PIPELINE_URL: ${{ vars.PIPELINE_URL }}
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
              | jq -r '.result.subdomain')
            PIPELINE_URL="https://chris-pipeline.$subdomain.workers.dev"
          fi
          curl -sf -X POST "$PIPELINE_URL/publish" \
            -H "Authorization: Bearer $PUBLISH_SHARED_SECRET" \
            -H "Content-Type: application/json" \
            --data "{\"sha\":\"$SHA\",\"repository\":\"$GITHUB_REPOSITORY\",\"branch\":\"$BRANCH\"}"
