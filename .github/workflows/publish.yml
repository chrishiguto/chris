# The CI half of the code path: the pipeline worker fires this via
# workflow_dispatch when a push contains code, and the step sequence — build,
# size gate, deploy, purge, /publish callback — makes the deploy precede the
# publish. The callback triggers a reconcile-to-HEAD, so a stale or
# duplicate run can never publish old content.
name: publish

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit that triggered the publish
        required: true
        type: string

# Overlapping dispatches serialize; a superseded queued run is fine because
# every /publish callback reconciles to HEAD — later runs are idempotent.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v3

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos and worker-build
        run: cargo binstall -y cargo-leptos worker-build

      - name: Build both workers
        run: |
          just build
          just build-pipeline

      # Fails past the 10 MB gzipped Workers limit, warns at 5 MB
      - name: Enforce the worker size budget
        run: just size

      - name: Deploy the site worker
        run: just deploy

      - name: Deploy the pipeline worker
        run: just deploy-pipeline

      # Deploys invalidate everything (hashed assets, hydration pairing).
      # purge_everything needs a zone, and workers.dev has
      # none: the step only runs once a custom domain lands and its zone id
      # is set as the CLOUDFLARE_ZONE_ID repo variable.
      - name: Purge the cache (custom-domain zones only)
        if: vars.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      # Deploy is live; trigger the coordinator's reconcile so content lands
      # against the freshly deployed manifest. PIPELINE_URL (repo variable)
      # overrides the derived workers.dev URL once a custom domain lands.
      - name: Trigger the publish reconcile
        env:
          PUBLISH_SHARED_SECRET: ${{ secrets.PUBLISH_SHARED_SECRET }}
          PIPELINE_URL: ${{ vars.PIPELINE_URL }}
          SHA: ${{ inputs.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
              | jq -r '.result.subdomain')
            PIPELINE_URL="https://chris-pipeline.$subdomain.workers.dev"
          fi
          curl -sf -X POST "$PIPELINE_URL/publish" \
            -H "Authorization: Bearer $PUBLISH_SHARED_SECRET" \
            -H "Content-Type: application/json" \
            --data "{\"sha\":\"$SHA\",\"repository\":\"$GITHUB_REPOSITORY\",\"branch\":\"$BRANCH\"}"
