# The CI half of ADR-0007's code path: the pipeline worker fires this via
# workflow_dispatch when a push contains code, and the step sequence — build,
# size gate, deploy, purge, /publish callback — is what guarantees
# deploy-before-publish ordering for mixed commits. No state machine.
name: publish

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit that triggered the publish
        required: true
        type: string

# Overlapping dispatches serialize; a superseded queued run is fine because
# the newest run's /publish callback drains the whole pending list.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: extractions/setup-just@v3

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos and worker-build
        run: cargo binstall -y cargo-leptos worker-build

      - name: Build both workers
        run: |
          just build
          just build-pipeline

      # Workers caps scripts at 10 MB gzipped; warn early at 5 MB (user story 27)
      - name: Enforce the worker size budget
        run: |
          budget() {
            local label=$1 file=$2 size
            size=$(gzip -9 -c "$file" | wc -c)
            echo "$label: $size bytes gzipped"
            if [ "$size" -gt 10485760 ]; then
              echo "::error::$label exceeds the 10 MB gzipped Workers limit ($size bytes)"
              exit 1
            elif [ "$size" -gt 5242880 ]; then
              echo "::warning::$label is over 5 MB gzipped ($size bytes), approaching the 10 MB limit"
            fi
          }
          budget "site worker" workers/site/build/index_bg.wasm
          budget "pipeline worker" workers/pipeline/build/index_bg.wasm

      - name: Deploy the site worker
        run: npx wrangler deploy

      - name: Deploy the pipeline worker
        run: npx wrangler deploy --config workers/pipeline/wrangler.toml

      # Deploys invalidate everything (hashed assets, hydration pairing —
      # user story 24). purge_everything needs a zone, and workers.dev has
      # none: the step only runs once a custom domain lands and its zone id
      # is set as the CLOUDFLARE_ZONE_ID repo variable (see Slice 8 / #11).
      - name: Purge the cache (custom-domain zones only)
        if: vars.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      # Deploy is live; drain the pending content this push (and any earlier
      # parked failures) queued. PIPELINE_URL (repo variable) overrides the
      # derived workers.dev URL once a custom domain lands.
      - name: Publish pending content
        env:
          PUBLISH_SHARED_SECRET: ${{ secrets.PUBLISH_SHARED_SECRET }}
          PIPELINE_URL: ${{ vars.PIPELINE_URL }}
          SHA: ${{ inputs.sha }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            subdomain=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
              | jq -r '.result.subdomain')
            PIPELINE_URL="https://chris-pipeline.$subdomain.workers.dev"
          fi
          curl -sf -X POST "$PIPELINE_URL/publish" \
            -H "Authorization: Bearer $PUBLISH_SHARED_SECRET" \
            -H "Content-Type: application/json" \
            --data "{\"sha\":\"$SHA\",\"repository\":\"$GITHUB_REPOSITORY\"}"
