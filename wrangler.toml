name = "chris-site"
main = "workers/site/build/index.js"
compatibility_date = "2026-07-07"

# Workers Cache fronts the fetch handler: hits are served before the worker
# runs, stored per each response's Cache-Control, evicted by Cache-Tag
# through /__purge. (Docs say keys include the deployed version; CI still
# purges after deploys until that is verified in production.)
[cache]
enabled = true

[build]
# The pipeline lives in the justfile so dev, deploy, and ci share one definition.
command = "just build"
# wrangler dev re-runs the build on changes here; its default watch dir is
# ./src, which doesn't exist in this workspace — without this list it watches
# nothing and every change needs a manual restart. Build inputs only: app/tests
# is native-only, content ships via `just publish` not the build (so a post's
# rare components.rs island needs a manual restart), and workers/site is
# narrowed to src because build/ is generated output and would loop.
watch_dir = ["app/src", "app/style", "app/assets", "crates", "workers/site/src"]

# Anything under target/site (including /pkg/*) is served without invoking the worker.
[assets]
directory = "./target/site"

# Keys: `snapshot:{sha}:post:{slug}` / `snapshot:{sha}:index` behind the
# `current` pointer. `wrangler dev` ignores the id.
[[kv_namespaces]]
binding = "BLOG"
id = "86ddce8f97854520bb4c9ec79cd838f0"

# Secrets (wrangler secret put): PURGE_SHARED_SECRET — authenticates
# POST /__purge calls (same value the pipeline worker and CI hold).
